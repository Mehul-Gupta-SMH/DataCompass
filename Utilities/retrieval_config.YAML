models_repo:
  path : 'C:/Users/mehul/Documents/Projects - GIT/Agents/Decompose KG from Code/pythonProject/Model'

# ---------------------------------------------------------


indexing:
  model: 'mixedbread-ai/mxbai-embed-large-v1'


# ---------------------------------------------------------


scoring:
  crossencoder: 'mixedbread-ai/mxbai-rerank-base-v1'
  bias_detection: "d4data/bias-detection-model"
  reranker_threshold: 0.0      # cross-encoder logit cutoff; scores above this are kept
  column_score_threshold: 0.0  # BM25 cutoff for column relevance; key columns always kept


# ---------------------------------------------------------


vectordb:
  name: 'chroma'
  path: 'C:\Users\mehul\Documents\Projects - GIT\Agents\SQLCoder\MetadataManager\MetadataStore\MetadataStorage\vdb'
  metadata:
    collection_name: 'tableScan'
    sim_metric: 'cosine'
    n_chunks: 3


# ---------------------------------------------------------


relationdb:
  name: 'kuzu'
  path: 'C:\Users\mehul\Documents\Projects - GIT\Agents\SQLCoder\MetadataManager\MetadataStore\MetadataStorage\relationsdb\Relations.pickle'
  viz: 'C:\Users\mehul\Documents\Projects - GIT\Agents\SQLCoder\MetadataManager\MetadataStore\MetadataStorage\relationsdb\DataMap.html'
  # kuzu DB dirs live at: <relationsdb_dir>/kuzudb/<instance_name>/
  # Relations.pickle is kept as a read-only backup and used for auto-migration on first run.


# ---------------------------------------------------------

tableMDdb:
  info_type : "table"
  dbName : "tableMetadata"
  tableDescName : "tableDesc"
  tableColName : "tableColMetadata"


# ---------------------------------------------------------

gather_requirements:
  max_tool_calls: 5   # max schema-fetch tool calls before fallback question
